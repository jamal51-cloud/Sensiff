<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF SENSI MAX</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

<div class="logo">FF SENSI MAX</div>
<div class="subtitle">Sensi Late Game + YTBR SENSI</div>

<div class="card">

<div class="tabs">
<button class="tab active" onclick="showTab('device')">DEVICE</button>
<button class="tab" onclick="showTab('ytbr')">YTBRSENSI</button>
</div>

<div id="deviceTab">

<div class="label">Pilih Device</div>

<select id="brand">
<option>Samsung Galaxy S24 Ultra</option>
<option>Samsung Galaxy A15</option>
<option>Xiaomi Redmi Note 13</option>
<option>POCO X6 Pro</option>
<option>Infinix GT 20 Pro</option>
<option>TECNO POVA 6</option>
<option>realme GT Neo</option>
<option>ROG Phone 8</option>
<option>iPhone 15 Pro Max</option>
<option>Advan GX</option>
<option>vivo V30</option>
<option>OPPO Reno 11</option>
</select>

<button onclick="generateSensi()">LIHAT SENSI</button>

</div>

<div id="ytbrTab" style="display:none;">

<div class="label">Pilih Sensi Youtuber</div>

<select id="ytbr">
<option>Hakai FF</option>
<option>Frontal Gaming</option>
<option>DEDD GAME</option>
<option>Kulgar</option>
<option>Rido Odin</option>
<option>Bangsad FF</option>
<option>Rizky Gaming</option>
<option>M8N</option>
</select>

<button onclick="generateYtbr()">LIHAT YTBRSENSI</button>

</div>

<div class="result" id="result">

<h2>SENSI GACOR</h2>

<div class="item"><span>General</span><span id="general"></span></div>
<div class="item"><span>Red Dot</span><span id="reddot"></span></div>
<div class="item"><span>2x Scope</span><span id="scope2x"></span></div>
<div class="item"><span>4x Scope</span><span id="scope4x"></span></div>
<div class="item"><span>Sniper</span><span id="sniper"></span></div>
<div class="item"><span>Free Look</span><span id="freelook"></span></div>
<div class="item"><span>DPI</span><span id="dpi"></span></div>
<div class="item"><span>Style</span><span id="touch"></span></div>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF SENSI PRO</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<div class="logo">FF SENSI PRO</div>
<div class="subtitle">Auto Sensi Sesuai HP Kamu</div>

<div class="card">

<div class="label">Brand HP</div>
<select id="brand">
<option>Samsung</option>
<option>Xiaomi</option>
<option>OPPO</option>
<option>vivo</option>
<option>realme</option>
<option>Infinix</option>
<option>TECNO</option>
<option>POCO</option>
<option>ASUS</option>
<option>iQOO</option>
<option>Advan</option>
<option>Lenovo</option>
<option>Nokia</option>
<option>Huawei</option>
<option>Redmi</option>
<option>ROG Phone</option>
<option>iPhone</option>
</select>

<div class="label">RAM HP</div>
<select id="ram">
<option>2 GB</option>
<option>3 GB</option>
<option>4 GB</option>
<option>6 GB</option>
<option>8 GB</option>
<option>12 GB</option>
<option>16 GB</option>
</select>

<div class="label">FPS</div>
<select id="fps">
<option>30 FPS</option>
<option>60 FPS</option>
<option>90 FPS</option>
<option>120 FPS</option>
</select>

<button onclick="generateSensi()">GENERATE SENSI</button>

<div class="result" id="result">
<h2>SETTING TERBAIK</h2>

<div class="item"><span>General</span><span id="general"></span></div>
<div class="item"><span>Red Dot</span><span id="reddot"></span></div>
<div class="item"><span>2x Scope</span><span id="scope2x"></span></div>
<div class="item"><span>4x Scope</span><span id="scope4x"></span></div>
<div class="item"><span>Sniper Scope</span><span id="sniper"></span></div>
<div class="item"><span>Free Look</span><span id="freelook"></span></div>
<div class="item"><span>DPI</span><span id="dpi"></span></div>
<div class="item"><span>Touch</span><span id="touch"></span></div>

</div>
</div>

<div class="footer">
FF SENSI PRO © 2026
</div>

</div>

<script src="script.js"></script>
</body>
</html>
